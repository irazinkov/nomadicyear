name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - feat-infra-astro-bootstrap

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format

      - name: Type check
        run: npm run check

      - name: Phase 4 validate
        run: npm run phase4:validate:strict-alt

      - name: Build and measure
        run: npm run phase4:measure
